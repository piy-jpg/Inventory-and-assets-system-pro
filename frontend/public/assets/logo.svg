<svg width="40" height="32" viewBox="0 0 40 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Box/Container -->
  <rect x="2" y="4" width="36" height="24" rx="3" fill="url(#logoGradient)" stroke="#1E40AF" stroke-width="1"/>
  
  <!-- Inventory icon - boxes stacked -->
  <rect x="8" y="10" width="8" height="6" rx="1" fill="#FFFFFF" opacity="0.9"/>
  <rect x="16" y="14" width="8" height="6" rx="1" fill="#FFFFFF" opacity="0.8"/>
  <rect x="24" y="8" width="8" height="6" rx="1" fill="#FFFFFF" opacity="0.95"/>
  
  <!-- Small details -->
  <circle cx="10" cy="13" r="1" fill="#1E40AF"/>
  <circle cx="18" cy="17" r="1" fill="#1E40AF"/>
  <circle cx="26" cy="11" r="1" fill="#1E40AF"/>
  
  <!-- Text "SI" for Smart Inventory -->
  <text x="20" y="28" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#FFFFFF" text-anchor="middle">SI</text>
</svg>
